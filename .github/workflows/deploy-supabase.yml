name: Deploy Supabase backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: edznwgvyqpsibnkqqeby
      TENCENT_VOD_SECRET_ID: ${{ secrets.TENCENT_VOD_SECRET_ID }}
      TENCENT_VOD_SECRET_KEY: ${{ secrets.TENCENT_VOD_SECRET_KEY }}
      TENCENT_VOD_APP_ID: ${{ secrets.TENCENT_VOD_APP_ID }}
      TENCENT_VOD_SUB_APP_ID: ${{ secrets.TENCENT_VOD_SUB_APP_ID }}
      TENCENT_VOD_PROCEDURE: ${{ secrets.TENCENT_VOD_PROCEDURE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Link project
        run: pnpm dlx supabase@latest link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - name: Apply migrations
        run: pnpm dlx supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD"
      - name: Configure function secrets
        run: |
          pnpm dlx supabase@latest secrets set PUBLIC_SITE_URL=https://348933516.github.io --project-ref "$PROJECT_REF"
          if [ -n "$TENCENT_VOD_SECRET_ID" ] && [ -n "$TENCENT_VOD_SECRET_KEY" ] && [ -n "$TENCENT_VOD_APP_ID" ] && [ -n "$TENCENT_VOD_PROCEDURE" ]; then
            pnpm dlx supabase@latest secrets set TENCENT_VOD_SECRET_ID="$TENCENT_VOD_SECRET_ID" TENCENT_VOD_SECRET_KEY="$TENCENT_VOD_SECRET_KEY" TENCENT_VOD_APP_ID="$TENCENT_VOD_APP_ID" TENCENT_VOD_PROCEDURE="$TENCENT_VOD_PROCEDURE" --project-ref "$PROJECT_REF"
            if [ -n "$TENCENT_VOD_SUB_APP_ID" ]; then pnpm dlx supabase@latest secrets set TENCENT_VOD_SUB_APP_ID="$TENCENT_VOD_SUB_APP_ID" --project-ref "$PROJECT_REF"; fi
          fi
      - name: Deploy changed functions
        run: |
          all_functions=(invite-admin update-admin import-url publish-content restore-revision save-content migrate-legacy batch-content duplicate-content delete-content document-import vod-signature vod-complete vod-import vod-status)
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then before="HEAD^"; fi
          changed="$(git diff --name-only "$before" HEAD -- supabase/functions supabase/config.toml)"
          if printf '%s\n' "$changed" | grep -q '^supabase/functions/_shared/\|^supabase/config.toml$'; then
            functions=("${all_functions[@]}")
          else
            mapfile -t functions < <(printf '%s\n' "$changed" | sed -n 's#^supabase/functions/\([^/]*\)/.*#\1#p' | sort -u)
          fi
          # Re-deploy the import pair when this workflow changes so a prior failed deploy is repaired.
          if [ "${#functions[@]}" -eq 0 ]; then functions=(document-import save-content); fi
          for function in "${functions[@]}"; do
            echo "Deploying $function"
            for attempt in 1 2 3; do
              output_file="$(mktemp)"
              if pnpm dlx supabase@latest functions deploy "$function" --project-ref "$PROJECT_REF" >"$output_file" 2>&1; then
                cat "$output_file"
                rm -f "$output_file"
                break
              fi
              cat "$output_file"
              if [ "$attempt" -eq 3 ]; then
                message="$(tail -n 20 "$output_file" | tr '\n' ' ' | sed 's/%/%25/g')"
                echo "::error title=Supabase deploy failed for $function::$message"
                rm -f "$output_file"
                exit 1
              fi
              rm -f "$output_file"
              sleep $((attempt * 10))
            done
          done
