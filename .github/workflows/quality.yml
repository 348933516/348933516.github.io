name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Verify preview artifacts
        run: |
          test -s preview/index.html
          test -s preview/manifest.webmanifest
          grep -q '/preview/assets/' preview/index.html
          find preview/assets -maxdepth 1 -type f -name '*.js' -size +0c | grep -q .
          find preview/assets -maxdepth 1 -type f -name '*.css' -size +0c | grep -q .
