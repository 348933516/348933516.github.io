<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MapleStoryNK 资料目录</title>
    <meta name="description" content="MapleStoryNK WZ业务、定制地图、BOSS配套地图与系列地图资料目录">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b0e;
        --bg-soft: #0b1115;
        --panel: rgba(18, 28, 36, 0.86);
        --panel-solid: #111b23;
        --panel-2: #17252f;
        --line: rgba(238, 245, 247, 0.12);
        --line-strong: rgba(238, 245, 247, 0.22);
        --text: #f7faf7;
        --soft: #dce6e1;
        --muted: #a8b5bd;
        --muted-2: #74828b;
        --teal: #45d9b3;
        --gold: #efbd55;
        --red: #ff7166;
        --blue: #7eb0ff;
        --shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(69, 217, 179, 0.12), transparent 28%),
          linear-gradient(225deg, rgba(239, 189, 85, 0.11), transparent 30%),
          linear-gradient(180deg, #0a0f12 0%, #070b0e 54%, #0a100e 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      img,
      video {
        display: block;
        max-width: 100%;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        border-bottom: 1px solid var(--line);
        background: rgba(7, 11, 14, 0.9);
        backdrop-filter: blur(18px);
      }

      .topbar-inner {
        width: min(1280px, calc(100% - 32px));
        min-height: 72px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        min-width: 0;
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #07130f;
        background: linear-gradient(135deg, var(--teal), var(--gold));
        font-weight: 900;
      }

      .brand-copy {
        display: grid;
        gap: 2px;
      }

      .brand-copy strong {
        font-size: 16px;
        letter-spacing: 0;
      }

      .brand-copy span {
        color: var(--muted);
        font-size: 12px;
      }

      .text-button,
      .icon-button,
      .nav-button,
      .seg-button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
      }

      .text-button,
      .nav-button,
      .seg-button {
        padding: 0 14px;
        white-space: nowrap;
      }

      .icon-button {
        width: 40px;
        padding: 0;
      }

      .primary {
        border-color: transparent;
        color: #07130f;
        background: linear-gradient(135deg, var(--teal), #98efce);
        font-weight: 800;
      }

      .danger {
        border-color: rgba(255, 113, 102, 0.4);
        color: #ffd7d2;
        background: rgba(255, 113, 102, 0.12);
      }

      .public-view {
        display: block;
      }

      .view-admin .public-view {
        display: none;
      }

      .catalog-page,
      .detail-page {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 80px;
      }

      .catalog-tools {
        margin-bottom: 28px;
        display: grid;
        grid-template-columns: minmax(240px, 1fr) auto;
        gap: 10px;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
        outline: none;
      }

      .input,
      .select {
        height: 42px;
        padding: 0 12px;
      }

      .textarea {
        min-height: 126px;
        padding: 12px;
        resize: vertical;
      }

      .lane-list {
        display: grid;
        gap: 38px;
      }

      .lane {
        position: relative;
        border-top: 1px solid var(--line);
        padding-top: 20px;
      }

      .lane-head {
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .lane-title {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .lane-title h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .lane-count {
        color: var(--muted);
        font-size: 13px;
      }

      .lane-scroll {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(320px, 392px);
        gap: 14px;
        overflow-x: auto;
        padding-bottom: 14px;
        scrollbar-color: rgba(255, 255, 255, 0.28) transparent;
      }

      .content-card {
        min-height: 168px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 136px 1fr;
        background: var(--panel);
        box-shadow: var(--shadow);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .content-card:hover {
        transform: translateY(-3px);
        border-color: rgba(69, 217, 179, 0.36);
        background: rgba(20, 34, 42, 0.92);
      }

      .content-card img {
        width: 136px;
        height: 100%;
        object-fit: cover;
      }

      .media-count {
        width: fit-content;
        min-height: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 3px 7px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
      }

      .card-body {
        min-width: 0;
        padding: 15px;
        display: grid;
        align-content: space-between;
        gap: 12px;
      }

      .card-body h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .card-body p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.62;
      }

      .empty-card {
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        padding: 22px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      .detail-shell {
        display: grid;
        gap: 22px;
      }

      .detail-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .detail-article {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(16, 24, 32, 0.76);
        box-shadow: var(--shadow);
      }

      .detail-cover {
        min-height: 280px;
        max-height: 520px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05);
      }

      .detail-cover img,
      .detail-cover video {
        width: 100%;
        height: min(52vw, 520px);
        min-height: 280px;
        object-fit: cover;
      }

      .detail-content {
        max-width: 920px;
        padding: 32px;
      }

      .detail-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        border: 1px solid rgba(69, 217, 179, 0.24);
        border-radius: 8px;
        padding: 0 10px;
        color: #dffff5;
        background: rgba(69, 217, 179, 0.1);
        font-size: 13px;
      }

      .detail-content h1 {
        margin: 16px 0 12px;
        font-size: clamp(32px, 5vw, 58px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .detail-summary {
        margin: 0 0 28px;
        color: var(--soft);
        font-size: 17px;
        line-height: 1.78;
      }

      .reader-body {
        color: var(--soft);
        font-size: 16px;
        line-height: 1.86;
      }

      .reader-body h1,
      .reader-body h2,
      .reader-body h3 {
        color: var(--text);
        line-height: 1.25;
      }

      .reader-body p {
        margin: 0 0 15px;
      }

      .reader-body ul,
      .reader-body ol {
        padding-left: 22px;
      }

      .detail-layout {
        display: grid;
        grid-template-columns: 230px minmax(0, 1fr);
        gap: 22px;
        align-items: start;
      }

      .outline-panel {
        position: sticky;
        top: 92px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.04);
      }

      .outline-panel h2 {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .outline-link {
        width: 100%;
        min-height: 32px;
        border: 0;
        padding: 0 6px;
        display: flex;
        align-items: center;
        color: var(--soft);
        background: transparent;
        text-align: left;
      }

      .outline-link:hover {
        color: var(--teal);
      }

      .media-stack {
        display: grid;
        gap: 18px;
      }

      .media-entry {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
      }

      .media-entry img,
      .media-entry video {
        width: 100%;
        height: auto;
        max-height: none;
        object-fit: contain;
        background: #05080a;
      }

      .media-entry-body {
        padding: 14px;
        display: grid;
        gap: 8px;
      }

      .media-entry-body h3 {
        margin: 0;
        font-size: 18px;
      }

      .media-path {
        color: var(--muted);
        font-size: 13px;
      }

      .annotation {
        border-left: 3px solid var(--teal);
        padding: 8px 0 8px 12px;
        color: var(--soft);
        line-height: 1.7;
      }

      .lightbox-image {
        width: 100%;
        max-height: calc(100vh - 150px);
        object-fit: contain;
        background: #030506;
      }

      .detail-section-title {
        margin: 30px 0 14px;
        font-size: 20px;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .gallery-grid img,
      .gallery-grid video {
        width: 100%;
        aspect-ratio: 16 / 10;
        border: 1px solid var(--line);
        border-radius: 8px;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.05);
      }

      .attachment-list {
        margin-top: 28px;
        border-top: 1px solid var(--line);
        padding-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .admin-layout {
        display: none;
        min-height: calc(100vh - 72px);
        grid-template-columns: 264px minmax(0, 1fr);
      }

      .view-admin .admin-layout {
        display: grid;
      }

      .admin-sidebar {
        border-right: 1px solid var(--line);
        padding: 20px;
        background: rgba(8, 13, 16, 0.72);
      }

      .admin-sidebar h2 {
        margin: 0 0 18px;
        font-size: 18px;
      }

      .admin-menu {
        display: grid;
        gap: 8px;
      }

      .nav-button {
        width: 100%;
        justify-content: flex-start;
        border-color: transparent;
        color: var(--muted);
        background: transparent;
      }

      .nav-button.active,
      .nav-button:hover,
      .seg-button.active {
        color: var(--text);
        background: rgba(255, 255, 255, 0.1);
      }

      .admin-main {
        padding: 28px;
      }

      .admin-panel {
        display: none;
      }

      .admin-panel.active {
        display: block;
      }

      .section-head {
        margin-bottom: 22px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 34px;
        letter-spacing: 0;
      }

      .section-head p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .metric-grid {
        margin-bottom: 18px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .metric-card,
      .panel-card,
      .preview-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16, 24, 32, 0.78);
        box-shadow: var(--shadow);
      }

      .metric-card {
        padding: 18px;
      }

      .metric-card span {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-card strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
      }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel-card {
        padding: 18px;
      }

      .panel-card h3 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: auto;
        background: rgba(16, 24, 32, 0.74);
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 13px 14px;
        text-align: left;
        vertical-align: middle;
        font-size: 14px;
      }

      th {
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .status,
      .badge {
        min-height: 26px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 4px 8px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #f9fffb;
        background: rgba(255, 255, 255, 0.08);
        font-size: 12px;
      }

      .status {
        border-color: rgba(69, 217, 179, 0.28);
        color: #dffff5;
        background: rgba(69, 217, 179, 0.12);
      }

      .status.offline {
        border-color: rgba(255, 113, 102, 0.34);
        color: #ffd7d2;
        background: rgba(255, 113, 102, 0.12);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .progress {
        height: 8px;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .progress span {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, var(--teal), var(--gold));
        transition: width 180ms ease;
      }

      .preview-box {
        margin-top: 16px;
        padding: 16px;
      }

      .preview-body {
        max-height: 260px;
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: auto;
        padding: 14px;
        color: var(--soft);
        background: rgba(255, 255, 255, 0.04);
        line-height: 1.74;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.66);
      }

      .modal.active {
        display: flex;
      }

      .modal-box {
        width: min(980px, 100%);
        max-height: min(820px, calc(100vh - 40px));
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        overflow: auto;
        background: var(--panel-solid);
        box-shadow: var(--shadow);
      }

      .modal-head {
        min-height: 64px;
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .modal-head h3 {
        margin: 0;
        font-size: 18px;
      }

      .modal-content {
        padding: 18px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .form-field {
        display: grid;
        gap: 8px;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--muted);
        font-size: 13px;
      }

      .auth-tabs {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 90;
        border: 1px solid rgba(69, 217, 179, 0.28);
        border-radius: 8px;
        padding: 12px 14px;
        display: none;
        color: #eafff8;
        background: rgba(16, 24, 32, 0.96);
        box-shadow: var(--shadow);
      }

      .toast.active {
        display: block;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1040px) {
        .admin-layout,
        .detail-layout {
          grid-template-columns: 1fr;
        }

        .outline-panel {
          position: static;
        }

        .metric-grid,
        .panel-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .admin-sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }

      @media (max-width: 760px) {
        .topbar-inner,
        .section-head,
        .detail-top {
          align-items: stretch;
          flex-direction: column;
        }

        .topbar-inner {
          padding: 12px 0;
        }

        .catalog-tools,
        .metric-grid,
        .panel-grid,
        .form-grid,
        .gallery-grid {
          grid-template-columns: 1fr;
        }

        .lane-scroll {
          grid-auto-columns: minmax(286px, 86vw);
        }

        .content-card {
          grid-template-columns: 112px 1fr;
        }

        .content-card img {
          width: 112px;
        }

        .detail-content {
          padding: 22px;
        }

        .admin-main {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="#" id="brandHome">
            <span class="brand-mark">NK</span>
            <span class="brand-copy">
              <strong>MapleStoryNK</strong>
              <span>业务与地图资料中心</span>
            </span>
          </a>
          <button class="text-button" id="authButton"><i data-lucide="shield"></i>管理员</button>
        </div>
      </header>

      <main class="public-view">
        <section class="catalog-page" id="catalogView">
          <div class="catalog-tools">
            <input class="input" id="searchInput" type="search" placeholder="搜索资料">
            <button class="text-button" id="resetButton"><i data-lucide="rotate-ccw"></i>重置</button>
          </div>
          <div class="lane-list" id="directoryLanes"></div>
        </section>

        <section class="detail-page hidden" id="detailView"></section>
      </main>

      <section class="admin-layout" id="adminView">
        <aside class="admin-sidebar">
          <h2>管理后台</h2>
          <div class="admin-menu">
            <button class="nav-button active" data-panel="dashboard"><i data-lucide="gauge"></i>仪表盘</button>
            <button class="nav-button" data-panel="contents"><i data-lucide="database"></i>内容管理</button>
            <button class="nav-button" data-panel="import"><i data-lucide="file-input"></i>导入内容</button>
            <button class="nav-button" data-panel="admins"><i data-lucide="users"></i>账号权限</button>
            <button class="nav-button" id="backToSite"><i data-lucide="monitor"></i>返回前台</button>
          </div>
        </aside>

        <div class="admin-main">
          <section class="admin-panel active" data-admin-panel="dashboard">
            <div class="section-head">
              <div>
                <h2>仪表盘</h2>
                <p id="currentAdminLine">当前账号：未登录</p>
              </div>
              <button class="text-button primary" id="quickAddButton"><i data-lucide="plus"></i>新增内容</button>
            </div>
            <div class="metric-grid" id="metrics"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>最近更新</th>
                    <th>分类</th>
                    <th>导入来源</th>
                    <th>状态</th>
                    <th>排序</th>
                    <th>更新时间</th>
                  </tr>
                </thead>
                <tbody id="recentRows"></tbody>
              </table>
            </div>
          </section>

          <section class="admin-panel" data-admin-panel="contents">
            <div class="section-head">
              <div>
                <h2>内容管理</h2>
                <p>后台显示状态、排序、来源与编辑信息，前台只展示资料内容。</p>
              </div>
              <button class="text-button primary" id="addContentButton"><i data-lucide="plus"></i>新增内容</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>标题</th>
                    <th>分类</th>
                    <th>来源</th>
                    <th>媒体</th>
                    <th>状态</th>
                    <th>排序</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="contentRows"></tbody>
              </table>

    <script>
      const categories = ["WZ业务目录", "定制地图展示", "BOSS配套地图展示", "系列地图"];
      const contentKey = "maplestorynk.contents.v4";
      const adminKey = "maplestorynk.admins.v4";
      const sessionKey = "maplestorynk.session.v4";
      const fallbackImage = "https://images.unsplash.com/photo-1535378620166-273708d44e4c?auto=format&fit=crop&w=1200&q=80";

      const starterContents = [
        {
          id: "wz-001",
          title: "WZ 业务目录",
          category: "WZ业务目录",
          summary: "WZ 修改、素材替换、资源整理与交付目录。",
          bodyHtml: "<p>这里用于展示 WZ 业务内容。可以放业务范围、处理流程、交付格式、注意事项和案例说明。</p><p>后续从 Word 或网页导入后，正文会直接出现在这个详情页，而不是跳转到外部网站。</p>",
          image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1200&q=82",
          images: ["https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1200&q=82"],
          video: "",
          videos: [],
          attachments: [],
          source: "腾讯文档 WZ业务目录",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        },
        {
          id: "map-001",
          title: "定制地图展示",
          category: "定制地图展示",
          summary: "地图层级、入口区域、怪物分布与视觉风格。",
          bodyHtml: "<p>这里用于展示定制地图内容。可以放地图全景图、局部截图、演示视频、地图编号和对应 WZ 文件说明。</p>",
          image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=82",
          images: ["https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=82"],
          video: "",
          videos: [],
          attachments: [],
          source: "腾讯文档 定制地图展示",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        },
        {
          id: "boss-001",
          title: "BOSS 配套地图展示",
          category: "BOSS配套地图展示",
          summary: "BOSS 区域、出生点、传送门、奖励点和背景资源。",
          bodyHtml: "<p>这里用于展示 BOSS 配套地图内容。可以补充 BOSS 参数、入口条件、战斗流程、地图资源和掉落展示。</p>",
          image: "https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1200&q=82",
          images: ["https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1200&q=82"],
          video: "",
          videos: [],
          attachments: [],
          source: "腾讯文档 BOSS配套地图展示",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        },
        {
          id: "series-001",
          title: "系列地图",
          category: "系列地图",
          summary: "按主题组织多个连续地图，形成完整地图包。",
          bodyHtml: "<p>这里用于展示系列地图内容。可以按章节、等级、入口、任务线和地图包结构整理。</p>",
          image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=82",
          images: ["https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=82"],
          video: "",
          videos: [],
          attachments: [],
          source: "腾讯文档 系列地图",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        }
      ];

      const starterAdmins = [
        { id: "admin-1", name: "admin", password: "admin123", email: "admin@maplestorynk.online", role: "超级管理员", state: "启用", createdAt: "2026-07-18" }
      ];

      const $ = (selector) => document.querySelector(selector);
      const $$ = (selector) => Array.from(document.querySelectorAll(selector));

      let contents = loadCollection(contentKey, ["maplestorynk.contents.v3", "maplestorynk.contents.v2"], starterContents).map(normalizeContent);
      let admins = loadCollection(adminKey, ["maplestorynk.admins.v3", "maplestorynk.admins.v2"], starterAdmins).map(normalizeAdmin);
      let currentAdmin = JSON.parse(localStorage.getItem(sessionKey) || localStorage.getItem("maplestorynk.session.v3") || "null");
      let currentView = "catalog";
      let selectedContentId = null;
      let catalogScrollY = 0;
      let pendingImport = null;

      function loadCollection(key, legacyKeys, fallback) {
        for (const storageKey of [key, ...legacyKeys]) {
          try {
            const data = JSON.parse(localStorage.getItem(storageKey));
            if (Array.isArray(data)) return data;
          } catch {
            continue;
          }
        }
        return fallback;
      }

      function normalizeContent(item) {
        const status = item.status === "visible" ? "published" : item.status || "published";
        const images = uniqueList([...(Array.isArray(item.images) ? item.images : []), item.image].filter(Boolean));
        const videos = uniqueList([...(Array.isArray(item.videos) ? item.videos : []), item.video].filter(Boolean));
        const mediaItems = Array.isArray(item.mediaItems) && item.mediaItems.length
          ? item.mediaItems.map((media, index) => normalizeMediaItem(media, index)).filter((media) => media.src)
          : images.map((src, index) => normalizeMediaItem({ src, title: `图片 ${index + 1}`, path: item.category, note: "" }, index));
        return {
          id: item.id || `content-${Date.now()}-${Math.random()}`,
          title: item.title || "未命名内容",
          category: categories.includes(item.category) ? item.category : categories[0],
          summary: item.summary || item.detail || "暂无简介",
          bodyHtml: item.bodyHtml || textToHtml(item.detail || item.summary || ""),
          image: images[0] || item.image || fallbackImage,
          images: images.length ? images : [item.image || fallbackImage],
          video: videos[0] || item.video || "",
          videos,
          mediaItems,
          attachments: Array.isArray(item.attachments) ? item.attachments : [],
          source: item.source || "",
          order: Number(item.order || item.hot || 100),
          status,
          updatedAt: item.updatedAt || today()
        };
      }

      function normalizeAdmin(admin) {
        return {
          id: admin.id || `admin-${Date.now()}-${Math.random()}`,
          name: admin.name || "admin",
          password: admin.password || "admin123",
          email: admin.email || "admin@maplestorynk.online",
          role: admin.role || "内容管理员",
          state: admin.state || "启用",
          createdAt: admin.createdAt || today()
        };
      }

      function save() {
        try {
          localStorage.setItem(contentKey, JSON.stringify(contents));
          localStorage.setItem(adminKey, JSON.stringify(admins));
          localStorage.setItem(sessionKey, JSON.stringify(currentAdmin));
          return true;
        } catch {
          toast("本地存储已满：请压缩图片，或下一步接入真实文件存储");
          return false;
        }
      }

      function icon() {
        if (window.lucide) window.lucide.createIcons();
      }

      function toast(message) {
        const node = $("#toast");
        node.textContent = message;
        node.classList.add("active");
        setTimeout(() => node.classList.remove("active"), 2300);
      }

      function showModal(id) {
        const modal = $("#" + id);
        modal.classList.add("active");
        modal.setAttribute("aria-hidden", "false");
        icon();
      }

      function closeModal(id) {
        const modal = $("#" + id);
        modal.classList.remove("active");
        modal.setAttribute("aria-hidden", "true");
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function textToHtml(text) {
        return String(text || "")
          .split(/\n{2,}/)
          .map((block) => block.trim())
          .filter(Boolean)
          .map((block) => `<p>${escapeHtml(block).replace(/\n/g, "<br>")}</p>`)
          .join("");
      }

      function htmlToText(html) {
        const doc = new DOMParser().parseFromString(html || "", "text/html");
        return doc.body.textContent || "";
      }

      function parseAttachments(value) {
        return String(value || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const [name, url] = line.split("|").map((part) => part.trim());
            return { name: name || url || "附件", url: url || "" };
          });
      }

      function attachmentsToText(attachments) {
        return (attachments || []).map((item) => item.url ? `${item.name} | ${item.url}` : item.name).join("\n");
      }

      function normalizeMediaItem(media, index) {
        return {
          src: media.src || media.url || media.image || "",
          title: media.title || media.name || `图片 ${index + 1}`,
          path: media.path || media.categoryPath || "默认",
          note: media.note || media.description || media.caption || "",
          type: media.type || "image"
        };
      }

      function uniqueList(items) {
        return [...new Set((items || []).map((item) => String(item || "").trim()).filter(Boolean))];
      }

      function linesToList(value) {
        return uniqueList(String(value || "").split("\n"));
      }

      function listToLines(items) {
        return uniqueList(items).join("\n");
      }

      function coverImage(item) {
        return item.mediaItems?.[0]?.src || item.images?.[0] || item.image || fallbackImage;
      }

      function parseMediaItems(value) {
        return String(value || "")
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line, index) => {
            const parts = line.split("|").map((part) => part.trim());
            if (parts.length >= 4) return normalizeMediaItem({ path: parts[0], title: parts[1], note: parts[2], src: parts.slice(3).join("|") }, index);
            if (parts.length === 3) return normalizeMediaItem({ path: parts[0], title: parts[1], src: parts[2] }, index);
            if (parts.length === 2) return normalizeMediaItem({ title: parts[0], src: parts[1] }, index);
            return normalizeMediaItem({ src: parts[0], title: `图片 ${index + 1}` }, index);
          })
          .filter((media) => media.src);
      }

      function mediaItemsToText(items) {
        return (items || []).map((media, index) => {
          const item = normalizeMediaItem(media, index);
          return `${item.path} | ${item.title} | ${item.note} | ${item.src}`;
        }).join("\n");
      }

      function buildOutline(items) {
        const paths = [];
        (items || []).forEach((media, index) => {
          const levels = String(media.path || "默认").split("/").map((level) => level.trim()).filter(Boolean);
          levels.forEach((_, levelIndex) => {
            const path = levels.slice(0, levelIndex + 1).join("/");
            if (!paths.some((entry) => entry.path === path)) {
              paths.push({ path, label: levels[levelIndex], depth: levelIndex, target: index + 1 });
            }
          });
        });
        const outlinePaths = paths.map((entry) => `
          <button class="outline-link" data-scroll-media="${entry.target}" style="padding-left:${entry.depth * 18 + 6}px">${escapeHtml(entry.label)}</button>
        `).join("");
        const imageLinks = (items || []).map((media, index) => `
          <button class="outline-link" data-scroll-media="${index + 1}" style="padding-left:24px">${escapeHtml(media.title || `图片 ${index + 1}`)}</button>
        `).join("");
        return outlinePaths + imageLinks || `<span class="badge">暂无图片</span>`;
      }

      function renderMediaEditorPreview() {
        const items = parseMediaItems($("#contentImages")?.value || "");
        const html = items.map((media, index) => `
          <div class="content-card" style="grid-template-columns:96px 1fr;min-height:112px;margin-bottom:10px">

                <span class="media-path">${escapeHtml(media.path)}</span>
                <h3>${escapeHtml(media.title)}</h3>
                <p>${escapeHtml(media.note || "暂无标注")}</p>
              </div>
            </div>
          </div>

      function categoryIcon(category) {
        return {
          "WZ业务目录": "archive",
          "定制地图展示": "map",
          "BOSS配套地图展示": "swords",
          "系列地图": "layers-3"
        }[category] || "file-text";
      }

      function statusText(status) {
        return { published: "已发布", draft: "草稿", hidden: "隐藏" }[status] || status;
      }

      function visibleItems(category) {
        const keyword = $("#searchInput")?.value.trim().toLowerCase() || "";
        return contents
          .filter((item) => item.status === "published" && item.category === category)
          .filter((item) => {
            if (!keyword) return true;
            return [item.title, item.summary, htmlToText(item.bodyHtml)].join(" ").toLowerCase().includes(keyword);
          })
          .sort((a, b) => Number(a.order || 100) - Number(b.order || 100) || String(b.updatedAt).localeCompare(String(a.updatedAt)));
      }

      function setView(view, contentId = null) {
        if (currentView === "catalog" && view === "detail") catalogScrollY = window.scrollY;
        currentView = view;
        selectedContentId = contentId;
        document.body.classList.toggle("view-admin", view === "admin");
        $("#catalogView").classList.toggle("hidden", view !== "catalog");
        $("#detailView").classList.toggle("hidden", view !== "detail");
        if (view === "detail") {
          renderDetail();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
        if (view === "catalog") {
          renderCatalog();
          setTimeout(() => window.scrollTo({ top: catalogScrollY, behavior: "smooth" }), 0);
        }
        if (view === "admin") renderAdmin();
        icon();
      }

      function renderCatalog() {
        $("#directoryLanes").innerHTML = categories.map((category) => {
          const items = visibleItems(category);
          const cards = items.map((item) => `
            <article class="content-card">
              <img src="${coverImage(item)}" alt="${escapeHtml(item.title)}">
              <div class="card-body">
                <div>
                  <h3>${escapeHtml(item.title)}</h3>
                  <p>${escapeHtml(item.summary)}</p>
                </div>
                <div class="actions">
                  <span class="media-count"><i data-lucide="images"></i>${item.mediaItems?.length || item.images?.length || 0} 图</span>
                  <button class="text-button" data-detail="${item.id}"><i data-lucide="eye"></i>查看详情</button>
                </div>
              </div>
            </article>
          `).join("") || `<div class="empty-card">暂无内容</div>`;

          return `
            <section class="lane">
              <div class="lane-head">
                <div class="lane-title">
                  <i data-lucide="${categoryIcon(category)}"></i>
                  <h2>${category}</h2>

      function renderDetail() {
        const item = contents.find((entry) => entry.id === selectedContentId);
        if (!item) {
          setView("catalog");
          return;
        }
        const mediaItems = item.mediaItems?.length
          ? item.mediaItems.map((media, index) => normalizeMediaItem(media, index))
          : (item.images?.length ? item.images : [item.image || fallbackImage]).map((src, index) => normalizeMediaItem({ src, title: `图片 ${index + 1}`, path: item.category }, index));
        const images = uniqueList(mediaItems.map((media) => media.src));
        const videos = uniqueList(item.videos?.length ? item.videos : [item.video].filter(Boolean));
        const media = videos[0]
          ? `<video controls src="${videos[0]}"></video>`
          : `<img src="${images[0] || fallbackImage}" alt="${escapeHtml(item.title)}">`;
        const outline = buildOutline(mediaItems);
        const mediaStack = mediaItems.map((media, index) => `
          <section class="media-entry" id="media-${index + 1}">
            <button class="icon-button" data-lightbox="${index}" style="position:absolute;margin:12px" aria-label="放大图片"><i data-lucide="maximize-2"></i></button>
            <img src="${media.src}" alt="${escapeHtml(media.title)}" data-lightbox="${index}">
            <div class="media-entry-body">
              <span class="media-path">${escapeHtml(media.path)}</span>
              <h3>${escapeHtml(media.title)}</h3>
              ${media.note ? `<div class="annotation">${escapeHtml(media.note)}</div>` : ""}
            </div>
          </section>

        const videoGallery = videos.map((video) => `<div class="media-entry"><video controls src="${video}"></video></div>`).join("");

            ? `<a class="text-button" href="${attachment.url}" target="_blank" rel="noreferrer"><i data-lucide="paperclip"></i>${label}</a>`

        $("#detailView").innerHTML = `

            </div>
            <article class="detail-article">

              <div class="detail-content">
                <span class="detail-kicker"><i data-lucide="${categoryIcon(item.category)}"></i>${item.category}</span>
                <h1>${escapeHtml(item.title)}</h1>
                <p class="detail-summary">${escapeHtml(item.summary)}</p>
                <div class="detail-layout">
                  <aside class="outline-panel">
                    <h2>大纲</h2>
                    ${outline}

                  <div>
                    <div class="reader-body">${item.bodyHtml || textToHtml(item.summary)}</div>
                    ${mediaStack ? `<h2 class="detail-section-title">图片内容</h2><div class="media-stack">${mediaStack}</div>` : ""}
                    ${videoGallery ? `<h2 class="detail-section-title">视频内容</h2><div class="media-stack">${videoGallery}</div>` : ""}
                  </div>
                </div>
                ${attachments ? `<div class="attachment-list">${attachments}</div>` : ""}
              </div>
            </article>
          </div>
        `;

      }

      function updatePreview(data) {
        pendingImport = data;
        $("#previewTitle").value = data.title || "";
        $("#previewCategory").value = data.category || categories[0];
        $("#previewOrder").value = data.order || 100;

        $("#previewBody").innerHTML = `

        pendingImport = null;
        $("#previewTitle").value = "";

        $("#previewSource").value = "";
        $("#manualBody").value = "";
        $("#previewBody").innerHTML = "暂无预览。";
        setImportStatus("等待导入", 0);
      }

      function parseInputLink(value) {
        const url = value.match(/https?:\/\/\S+/)?.[0] || "";
        const title = value.replace(url, "").replace(/[【】]/g, " ").trim();
        return { url, title: title || url };
      }

      async function readDocument(file) {
        const lower = file.name.toLowerCase();
        if (lower.endsWith(".docx") && window.mammoth) {
          const result = await window.mammoth.convertToHtml({ arrayBuffer: await file.arrayBuffer() });
          return result.value;
        }
        return textToHtml(await file.text());
      }

      async function readUrlContent(url) {
        const targets = [url, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
        for (const target of targets) {
          try {
            const response = await fetch(target);
            if (!response.ok) continue;
            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, "text/html");
            doc.querySelectorAll("script, style, iframe, nav, footer").forEach((node) => node.remove());
            const title = doc.querySelector("title")?.textContent?.trim() || "";
            const nodes = Array.from(doc.querySelectorAll("h1, h2, h3, p, li")).slice(0, 80);
            const images = Array.from(doc.querySelectorAll("img"))
              .map((image) => image.getAttribute("src"))
              .filter(Boolean)
              .map((src) => {
                try {
                  return new URL(src, url).href;
                } catch {
                  return "";
                }
              })
              .filter(Boolean)
              .slice(0, 18);
            const bodyHtml = nodes.map((node) => {
              const text = node.textContent.trim();
              if (!text) return "";
              const tag = ["H1", "H2", "H3"].includes(node.tagName) ? node.tagName.toLowerCase() : "p";
              return `<${tag}>${escapeHtml(text)}</${tag}>`;
            }).join("");
            if (bodyHtml || images.length) return { title, bodyHtml, images };
          } catch {
            continue;
          }
        }
        return { title: "", bodyHtml: "", images: [] };
      }

      function appendLines(fieldId, values) {
        const field = $("#" + fieldId);
        field.value = listToLines([...linesToList(field.value), ...values]);
      }

      function filesToDataUrls(files) {
        return Promise.all(Array.from(files || []).map((file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        })));
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button, a, img[data-lightbox]");
        if (!target) return;

        if (target.dataset.close) closeModal(target.dataset.close);

        if (target.id === "authButton") {
          if (currentAdmin) setView("admin");
          else showModal("authModal");
        }

        if (target.id === "brandHome") {
          event.preventDefault();
          setView("catalog");
        }

        if (target.dataset.detail) setView("detail", target.dataset.detail);
        if (target.id === "returnCatalogButton") setView("catalog");

        if (target.dataset.scrollMedia) {
          $("#media-" + target.dataset.scrollMedia)?.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        if (target.dataset.lightbox) {
          const item = contents.find((entry) => entry.id === selectedContentId);
          const media = item?.mediaItems?.[Number(target.dataset.lightbox)];
          if (media?.src) {
            $("#imageModalTitle").textContent = media.title || "图片预览";
            $("#imageModalImg").src = media.src;
            showModal("imageModal");
          }
        }

        if (target.dataset.authTab) {
          $$(".seg-button[data-auth-tab]").forEach((button) => button.classList.toggle("active", button.dataset.authTab === target.dataset.authTab));
          $$("[data-auth-panel]").forEach((panel) => panel.classList.toggle("hidden", panel.dataset.authPanel !== target.dataset.authTab));
        }

        if (target.id === "quickAddButton" || target.id === "addContentButton") openContentEditor();
        if (target.dataset.editContent) openContentEditor(target.dataset.editContent);

        if (target.dataset.deleteContent) {
          const item = contents.find((entry) => entry.id === target.dataset.deleteContent);
          if (item && confirm(`删除「${item.title}」？`)) {
            contents = contents.filter((entry) => entry.id !== item.id);
            save();
            renderCatalog();
            renderAdmin();
            toast("内容已删除");
          }
        }

        if (target.id === "addAdminButton") {
          if (requireSuperAdmin()) openAdminEditor();
        }

        if (target.dataset.editAdmin) {
          if (requireSuperAdmin()) openAdminEditor(target.dataset.editAdmin);
        }

        if (target.dataset.resetAdmin) {
          if (!requireSuperAdmin()) return;
          const admin = admins.find((entry) => entry.id === target.dataset.resetAdmin);
          const nextPassword = prompt(`给「${admin.name}」设置新密码`);
          if (nextPassword) {
            admin.password = nextPassword;
            save();
            toast("密码已修改");
          }
        }

        if (target.dataset.deleteAdmin) {
          if (!requireSuperAdmin()) return;
          const admin = admins.find((entry) => entry.id === target.dataset.deleteAdmin);
          if (admin && confirm(`删除账号「${admin.name}」？`)) {
            admins = admins.filter((entry) => entry.id !== admin.id);
            save();
            renderAdmin();
            toast("账号已删除");
          }
        }

        if (target.id === "backToSite") setView("catalog");

        if (target.dataset.panel) {
          $$(".admin-menu .nav-button").forEach((button) => button.classList.toggle("active", button.dataset.panel === target.dataset.panel));
          $$(".admin-panel").forEach((panel) => panel.classList.toggle("active", panel.dataset.adminPanel === target.dataset.panel));
        }

        if (target.id === "confirmImportButton") {
          const manualText = $("#manualBody").value.trim();
          const importedText = htmlToText(pendingImport?.bodyHtml || "").trim();
          const bodyHtml = manualText === importedText ? pendingImport?.bodyHtml : textToHtml(manualText);
          const importedMediaItems = (pendingImport?.images || []).map((src, index) => normalizeMediaItem({
            src,
            title: `导入图片 ${index + 1}`,
            path: $("#previewCategory").value,
            note: ""
          }, index));
          if (!$("#previewTitle").value.trim() || !bodyHtml) {
            toast("标题和正文不能为空");
            return;
          }
          contents = [{
            id: `import-${Date.now()}`,
            title: $("#previewTitle").value.trim(),
            category: $("#previewCategory").value,
            summary: htmlToText(bodyHtml).slice(0, 70) || "导入内容",
            bodyHtml,
            images: importedMediaItems.length ? importedMediaItems.map((media) => media.src) : [fallbackImage],
            image: importedMediaItems[0]?.src || fallbackImage,
            mediaItems: importedMediaItems.length ? importedMediaItems : [normalizeMediaItem({ src: fallbackImage, title: "默认图片", path: $("#previewCategory").value }, 0)],
            video: "",
            videos: [],
            attachments: [],
            source: $("#previewSource").value.trim(),
            order: Number($("#previewOrder").value || 100),
            status: "published",
            updatedAt: today()
          }, ...contents];
          save();
          renderCatalog();
          renderAdmin();
          clearImport();
          toast("已添加到目录");
        }

        if (target.id === "clearImportButton") clearImport();
      });

      $("#loginForm").addEventListener("submit", (event) => {

      $("#contentForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const id = $("#contentId").value || `content-${Date.now()}`;
        const existing = contents.find((item) => item.id === id);
        const mediaItems = parseMediaItems($("#contentImages").value);
        const images = mediaItems.map((media) => media.src);
        const videos = linesToList($("#contentVideos").value);
        const next = {
          id,
          title: $("#contentTitle").value.trim(),
          category: $("#contentCategory").value,
          summary: $("#contentSummary").value.trim(),
          bodyHtml: textToHtml($("#contentBody").value.trim()),
          images,
          image: images[0] || fallbackImage,
          videos,
          video: videos[0] || "",
          mediaItems,
          attachments: parseAttachments($("#contentAttachments").value),
          source: $("#contentSource").value.trim(),
          order: Number($("#contentOrder").value || 100),
          status: $("#contentStatus").value,
          updatedAt: today()
        };
        contents = existing ? contents.map((item) => item.id === id ? next : item) : [next, ...contents];
        save();
        closeModal("contentModal");
        renderCatalog();
        renderAdmin();
        if (currentView === "detail" && selectedContentId === id) renderDetail();
        toast("内容已保存");

      $("#adminForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!requireSuperAdmin()) return;
        const id = $("#adminId").value;
        const existing = admins.find((entry) => entry.id === id);
        const password = $("#adminPassword").value.trim();
        const next = {
          id: id || `admin-${Date.now()}`,
          name: existing?.name || $("#adminName").value.trim(),
          password: password || existing?.password || "123456",
          email: $("#adminEmail").value.trim(),
          role: $("#adminRole").value,
          state: $("#adminState").value,
          createdAt: existing?.createdAt || today()
        };
        admins = existing ? admins.map((entry) => entry.id === id ? next : entry) : [...admins, next];
        if (currentAdmin?.id === next.id) currentAdmin = { id: next.id, name: next.name, role: next.role };
        save();
        $("#adminName").disabled = false;
        $("#adminForm").reset();
        closeModal("adminModal");
        renderAdmin();
        toast("账号已保存");
      });

      $("#docImportForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const file = $("#docFile").files?.[0];
        if (!file) {
          toast("请选择文档");
          return;
        }
        try {
          setImportStatus("正在读取文档", 25);
          const bodyHtml = await readDocument(file);
          setImportStatus("正在生成预览", 72);
          updatePreview({
            title: file.name.replace(/\.[^.]+$/, ""),
            category: $("#docCategory").value,
            order: Number($("#docOrder").value || 100),
            source: file.name,
            bodyHtml
          });
          setImportStatus("读取成功，请确认", 100);
        } catch {
          setImportStatus("读取失败，请手动粘贴正文", 100);
        }
      });

      $("#urlImportForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const parsed = parseInputLink($("#sourceInput").value.trim());
        if (!parsed.url) {
          toast("没有识别到网页地址");
          return;
        }
        setImportStatus("正在连接网页", 20);
        const result = await readUrlContent(parsed.url);
        setImportStatus(result.bodyHtml ? "正在生成预览" : "读取受限，可手动粘贴正文", 76);
        updatePreview({
          title: result.title || parsed.title,
          category: $("#urlCategory").value,
          order: Number($("#urlOrder").value || 100),
          source: parsed.url,
          bodyHtml: result.bodyHtml || "",
          images: result.images || []
        });
        setImportStatus(result.bodyHtml ? "读取成功，请确认" : "等待手动补充正文", 100);
      });

      $("#searchInput").addEventListener("input", renderCatalog);
      $("#resetButton").addEventListener("click", () => {
        $("#searchInput").value = "";
        renderCatalog();
      });

      $("#contentImageFile").addEventListener("change", (event) => {
        const files = event.target.files;
        if (!files?.length) return;
        filesToDataUrls(files).then((urls) => {
          const existingCount = parseMediaItems($("#contentImages").value).length;
          const category = $("#contentCategory").value || categories[0];
          const rows = urls.map((url, index) => `${category} | 图片 ${existingCount + index + 1} | 在这里填写标注说明 | ${url}`);
          appendLines("contentImages", rows);
          renderMediaEditorPreview();
          toast(`已追加 ${urls.length} 张图片`);
        }).catch(() => toast("图片读取失败"));
      });

      $("#contentVideoFile").addEventListener("change", (event) => {
        const files = event.target.files;
        if (!files?.length) return;
        const urls = Array.from(files).map((file) => URL.createObjectURL(file));
        appendLines("contentVideos", urls);
        toast(`已追加 ${urls.length} 个视频预览`);
      });

      $("#contentImages").addEventListener("input", renderMediaEditorPreview);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          $$(".modal.active").forEach((modal) => closeModal(modal.id));
          $("#adminName").disabled = false;
        }
      });

      renderSelects();
      renderCatalog();
      renderAdmin();
      save();
    </script>
  </body>
</html>
