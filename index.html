<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MapleStoryNK 资料目录</title>
    <meta name="description" content="MapleStoryNK WZ业务、定制地图、BOSS配套地图与系列地图资料目录">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080d10;
        --panel: #101820;
        --panel-2: #16232d;
        --line: rgba(238, 245, 247, 0.12);
        --line-2: rgba(238, 245, 247, 0.22);
        --text: #f6f8f6;
        --soft: #dbe4df;
        --muted: #a8b4bc;
        --teal: #45d9b3;
        --gold: #efbd55;
        --red: #ff7166;
        --shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
      }

      * { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(69, 217, 179, 0.12), transparent 26%),
          linear-gradient(225deg, rgba(239, 189, 85, 0.1), transparent 28%),
          linear-gradient(180deg, #0b1013 0%, #080d10 52%, #0a100e 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      }

      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      a { color: inherit; text-decoration: none; }
      img, video { display: block; max-width: 100%; }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        border-bottom: 1px solid var(--line);
        background: rgba(8, 13, 16, 0.9);
        backdrop-filter: blur(18px);
      }

      .topbar-inner {
        width: min(1280px, calc(100% - 32px));
        min-height: 72px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #06130f;
        background: linear-gradient(135deg, var(--teal), var(--gold));
        font-weight: 900;
      }

      .brand-text { display: grid; gap: 2px; }
      .brand-text strong { font-size: 16px; }
      .brand-text span { color: var(--muted); font-size: 12px; }

      .text-button, .icon-button, .nav-button, .seg-button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
      }

      .text-button, .nav-button, .seg-button { padding: 0 14px; white-space: nowrap; }
      .icon-button { width: 40px; padding: 0; }

      .primary {
        border-color: transparent;
        color: #07130f;
        background: linear-gradient(135deg, var(--teal), #98efce);
        font-weight: 800;
      }

      .danger {
        border-color: rgba(255, 113, 102, 0.4);
        color: #ffd7d2;
        background: rgba(255, 113, 102, 0.12);
      }

      .public-view { display: block; }
      .view-admin .public-view { display: none; }

      .catalog {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 76px;
      }

      .catalog-tools {
        margin-bottom: 22px;
        display: grid;
        grid-template-columns: minmax(240px, 1fr) auto;
        gap: 10px;
      }

      .input, .select, .textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
        outline: none;
      }

      .input, .select { height: 42px; padding: 0 12px; }
      .textarea { min-height: 122px; padding: 12px; resize: vertical; }

      .lane-list {
        display: grid;
        gap: 34px;
      }

      .lane {
        border-top: 1px solid var(--line);
        padding-top: 20px;
      }

      .lane-head {
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .lane-title {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .lane-title h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .lane-count {
        color: var(--muted);
        font-size: 13px;
      }

      .lane-scroll {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(310px, 380px);
        gap: 14px;
        overflow-x: auto;
        padding-bottom: 12px;
        scrollbar-color: rgba(255, 255, 255, 0.24) transparent;
      }

      .content-card {
        min-height: 160px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 130px 1fr;
        background: rgba(16, 24, 32, 0.82);
        box-shadow: var(--shadow);
      }

      .content-card img {
        width: 130px;
        height: 100%;
        object-fit: cover;
      }

      .card-body {
        min-width: 0;
        padding: 14px;
        display: grid;
        align-content: space-between;
        gap: 12px;
      }

      .card-body h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.35;
      }

      .card-body p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.62;
      }

      .empty-card {
        border: 1px dashed var(--line-2);
        border-radius: 8px;
        padding: 22px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      .admin-layout {
        display: none;
        min-height: calc(100vh - 72px);
        grid-template-columns: 264px minmax(0, 1fr);
      }

      .view-admin .admin-layout { display: grid; }

      .admin-sidebar {
        border-right: 1px solid var(--line);
        padding: 20px;
        background: rgba(8, 13, 16, 0.7);
      }

      .admin-sidebar h2 { margin: 0 0 18px; font-size: 18px; }
      .admin-menu { display: grid; gap: 8px; }

      .nav-button {
        width: 100%;
        justify-content: flex-start;
        border-color: transparent;
        color: var(--muted);
        background: transparent;
      }

      .nav-button.active, .nav-button:hover, .seg-button.active {
        color: var(--text);
        background: rgba(255, 255, 255, 0.1);
      }

      .admin-main { padding: 28px; }
      .admin-panel { display: none; }
      .admin-panel.active { display: block; }

      .section-head {
        margin-bottom: 22px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
      }

      .section-head h2 { margin: 0; font-size: 34px; }
      .section-head p { margin: 8px 0 0; color: var(--muted); line-height: 1.7; }

      .metric-grid {
        margin-bottom: 18px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .metric-card, .panel-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16, 24, 32, 0.78);
        box-shadow: var(--shadow);
      }

      .metric-card { padding: 18px; }
      .metric-card span { color: var(--muted); font-size: 13px; }
      .metric-card strong { display: block; margin-top: 8px; font-size: 30px; }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel-card { padding: 18px; }
      .panel-card h3 { margin: 0 0 12px; font-size: 18px; }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: auto;
        background: rgba(16, 24, 32, 0.74);
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
      }

      th, td {
        border-bottom: 1px solid var(--line);
        padding: 13px 14px;
        text-align: left;
        vertical-align: middle;
        font-size: 14px;
      }

      th { color: var(--muted); background: rgba(255, 255, 255, 0.04); }
      tr:last-child td { border-bottom: 0; }

      .status, .badge {
        min-height: 26px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 4px 8px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #f9fffb;
        background: rgba(255, 255, 255, 0.08);
        font-size: 12px;
      }

      .status { border-color: rgba(69, 217, 179, 0.28); color: #dffff5; background: rgba(69, 217, 179, 0.12); }
      .status.offline { border-color: rgba(255, 113, 102, 0.34); color: #ffd7d2; background: rgba(255, 113, 102, 0.12); }

      .actions { display: flex; align-items: center; gap: 8px; }

      .progress {
        height: 8px;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .progress span {
        display: block;
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, var(--teal), var(--gold));
        transition: width 180ms ease;
      }

      .preview-box {
        margin-top: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.05);
      }

      .preview-box h4 { margin: 0 0 10px; }
      .preview-body {
        max-height: 260px;
        overflow: auto;
        color: var(--soft);
        line-height: 1.76;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.66);
      }

      .modal.active { display: flex; }

      .modal-box {
        width: min(980px, 100%);
        max-height: min(820px, calc(100vh - 40px));
        border: 1px solid var(--line-2);
        border-radius: 8px;
        overflow: auto;
        background: #101820;
        box-shadow: var(--shadow);
      }

      .modal-head {
        min-height: 64px;
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .modal-head h3 { margin: 0; font-size: 18px; }
      .modal-content { padding: 18px; }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .form-field { display: grid; gap: 8px; }
      .form-field.full { grid-column: 1 / -1; }
      label { color: var(--muted); font-size: 13px; }

      .auth-tabs { margin-bottom: 16px; display: flex; gap: 8px; }

      .reader {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 20px;
      }

      .reader-media {
        margin-bottom: 18px;
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 16 / 9;
        background: rgba(255, 255, 255, 0.06);
      }

      .reader-media img, .reader-media video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .reader-body {
        color: var(--soft);
        line-height: 1.82;
        font-size: 16px;
      }

      .reader-body h1, .reader-body h2, .reader-body h3 { color: var(--text); }
      .reader-body p { margin: 0 0 14px; }
      .reader-body ul, .reader-body ol { padding-left: 22px; }

      .reader-side {
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .side-line {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      .side-line strong { display: block; margin-top: 4px; color: var(--text); }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 90;
        border: 1px solid rgba(69, 217, 179, 0.28);
        border-radius: 8px;
        padding: 12px 14px;
        display: none;
        color: #eafff8;
        background: rgba(16, 24, 32, 0.96);
        box-shadow: var(--shadow);
      }

      .toast.active { display: block; }
      .hidden { display: none !important; }

      @media (max-width: 1040px) {
        .admin-layout, .reader { grid-template-columns: 1fr; }
        .metric-grid, .panel-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .admin-sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      }

      @media (max-width: 760px) {
        .topbar-inner, .section-head { align-items: stretch; flex-direction: column; }
        .topbar-inner { padding: 12px 0; }
        .catalog-tools, .metric-grid, .panel-grid, .form-grid { grid-template-columns: 1fr; }
        .lane-scroll { grid-auto-columns: minmax(286px, 86vw); }
        .content-card { grid-template-columns: 112px 1fr; }
        .content-card img { width: 112px; }
        .admin-main { padding: 18px; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="#" id="brandHome">
            <span class="brand-mark">NK</span>
            <span class="brand-text">
              <strong>MapleStoryNK</strong>
              <span>业务与地图资料中心</span>
            </span>
          </a>
          <button class="text-button" id="authButton"><i data-lucide="shield"></i>管理员</button>
        </div>
      </header>

      <main class="public-view">
        <section class="catalog">
          <div class="catalog-tools">
            <input class="input" id="searchInput" type="search" placeholder="搜索资料">
            <button class="text-button" id="resetButton"><i data-lucide="rotate-ccw"></i>重置</button>
          </div>
          <div class="lane-list" id="directoryLanes"></div>
        </section>
      </main>

      <section class="admin-layout" id="adminView">
        <aside class="admin-sidebar">
          <h2>管理后台</h2>
          <div class="admin-menu">
            <button class="nav-button active" data-panel="dashboard"><i data-lucide="gauge"></i>仪表盘</button>
            <button class="nav-button" data-panel="contents"><i data-lucide="database"></i>内容管理</button>
            <button class="nav-button" data-panel="import"><i data-lucide="file-input"></i>导入内容</button>
            <button class="nav-button" data-panel="admins"><i data-lucide="users"></i>账号权限</button>
            <button class="nav-button" id="backToSite"><i data-lucide="monitor"></i>返回前台</button>
          </div>
        </aside>

        <div class="admin-main">
          <section class="admin-panel active" data-admin-panel="dashboard">
            <div class="section-head">
              <div>
                <h2>仪表盘</h2>
                <p id="currentAdminLine">当前账号：未登录</p>
              </div>
              <button class="text-button primary" id="quickAddButton"><i data-lucide="plus"></i>新增内容</button>
            </div>
            <div class="metric-grid" id="metrics"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>最近更新</th>
                    <th>分类</th>
                    <th>导入来源</th>
                    <th>状态</th>
                    <th>排序</th>
                    <th>更新时间</th>
                  </tr>
                </thead>
                <tbody id="recentRows"></tbody>
              </table>
            </div>
          </section>

          <section class="admin-panel" data-admin-panel="contents">
            <div class="section-head">
              <div>
                <h2>内容管理</h2>
                <p>后台显示状态、排序、来源与编辑信息，前台只展示资料内容。</p>
              </div>
              <button class="text-button primary" id="addContentButton"><i data-lucide="plus"></i>新增内容</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>标题</th>
                    <th>分类</th>
                    <th>来源</th>
                    <th>状态</th>
                    <th>排序</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="contentRows"></tbody>
              </table>
            </div>
          </section>

          <section class="admin-panel" data-admin-panel="import">
            <div class="section-head">
              <div>
                <h2>导入内容</h2>
                <p>读取后先预览，确认后才进入目录。</p>
              </div>
            </div>

            <div class="panel-grid">
              <div class="panel-card">
                <h3>上传文档</h3>
                <form class="form-grid" id="docImportForm">
                  <div class="form-field full">
                    <label for="docFile">文档文件</label>
                    <input class="input" id="docFile" type="file" accept=".docx,.txt,.md,.html,.htm">
                  </div>
                  <div class="form-field">
                    <label for="docCategory">分类</label>
                    <select class="select" id="docCategory"></select>
                  </div>
                  <div class="form-field">
                    <label for="docOrder">排序</label>
                    <input class="input" id="docOrder" type="number" value="100">
                  </div>
                  <button class="text-button primary" type="submit"><i data-lucide="file-up"></i>读取文档</button>
                </form>
              </div>

              <div class="panel-card">
                <h3>读取网页链接</h3>
                <form class="form-grid" id="urlImportForm">
                  <div class="form-field full">
                    <label for="sourceInput">网页地址或带标题链接</label>
                    <input class="input" id="sourceInput" placeholder="【腾讯文档】WZ业务目录 https://docs.qq.com/doc/..." required>
                  </div>
                  <div class="form-field">
                    <label for="urlCategory">分类</label>
                    <select class="select" id="urlCategory"></select>
                  </div>
                  <div class="form-field">
                    <label for="urlOrder">排序</label>
                    <input class="input" id="urlOrder" type="number" value="100">
                  </div>
                  <button class="text-button primary" type="submit"><i data-lucide="link"></i>读取链接</button>
                </form>
              </div>
            </div>

            <div class="preview-box" id="importBox">
              <div class="form-grid">
                <div class="form-field full">
                  <label>读取状态</label>
                  <div class="progress"><span id="importProgress"></span></div>
                  <span class="badge" id="importStatus">等待导入</span>
                </div>
                <div class="form-field">
                  <label for="previewTitle">标题</label>
                  <input class="input" id="previewTitle">
                </div>
                <div class="form-field">
                  <label for="previewCategory">分类</label>
                  <select class="select" id="previewCategory"></select>
                </div>
                <div class="form-field full">
                  <label for="manualBody">正文内容</label>
                  <textarea class="textarea" id="manualBody" placeholder="读取失败时，可在这里粘贴正文。"></textarea>
                </div>
                <div class="form-field">
                  <label for="previewOrder">排序</label>
                  <input class="input" id="previewOrder" type="number" value="100">
                </div>
                <div class="form-field">
                  <label for="previewSource">后台来源记录</label>
                  <input class="input" id="previewSource">
                </div>
              </div>
              <div class="preview-body" id="previewBody"></div>
              <div class="actions" style="margin-top:14px">
                <button class="text-button primary" id="confirmImportButton"><i data-lucide="check"></i>确认添加</button>
                <button class="text-button" id="clearImportButton"><i data-lucide="x"></i>清空</button>
              </div>
            </div>
          </section>

          <section class="admin-panel" data-admin-panel="admins">
            <div class="section-head">
              <div>
                <h2>账号权限</h2>
                <p>超级管理员可调整角色、启停账号、修改密码和维护找回邮箱。</p>
              </div>
              <button class="text-button primary" id="addAdminButton"><i data-lucide="user-plus"></i>新增账号</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>账号</th>
                    <th>角色</th>
                    <th>找回邮箱</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="adminRows"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </div>

    <div class="modal" id="authModal" aria-hidden="true">
      <div class="modal-box" style="width:min(520px,100%)">
        <div class="modal-head">
          <h3>账号中心</h3>
          <button class="icon-button" data-close="authModal" aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-content">
          <div class="auth-tabs">
            <button class="seg-button active" data-auth-tab="login"><i data-lucide="log-in"></i>登录</button>
            <button class="seg-button" data-auth-tab="register"><i data-lucide="user-plus"></i>注册</button>
          </div>

          <form class="form-grid" id="loginForm" data-auth-panel="login">
            <div class="form-field full">
              <label for="loginUser">账号</label>
              <input class="input" id="loginUser" value="admin" autocomplete="username">
            </div>
            <div class="form-field full">
              <label for="loginPass">密码</label>
              <input class="input" id="loginPass" type="password" value="admin123" autocomplete="current-password">
            </div>
            <button class="text-button primary" type="submit"><i data-lucide="log-in"></i>登录</button>
          </form>

          <form class="form-grid hidden" id="registerForm" data-auth-panel="register">
            <div class="form-field full">
              <label for="registerUser">账号</label>
              <input class="input" id="registerUser" required autocomplete="username">
            </div>
            <div class="form-field full">
              <label for="registerPass">密码</label>
              <input class="input" id="registerPass" type="password" required autocomplete="new-password">
            </div>
            <div class="form-field full">
              <label for="registerEmail">找回邮箱</label>
              <input class="input" id="registerEmail" type="email" required autocomplete="email">
            </div>
            <button class="text-button primary" type="submit"><i data-lucide="user-plus"></i>注册账号</button>
          </form>
        </div>
      </div>
    </div>

    <div class="modal" id="detailModal" aria-hidden="true">
      <div class="modal-box">
        <div class="modal-head">
          <h3 id="detailTitle">详情</h3>
          <button class="icon-button" data-close="detailModal" aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-content" id="detailContent"></div>
      </div>
    </div>

    <div class="modal" id="contentModal" aria-hidden="true">
      <div class="modal-box">
        <div class="modal-head">
          <h3 id="contentModalTitle">新增内容</h3>
          <button class="icon-button" data-close="contentModal" aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-content">
          <form class="form-grid" id="contentForm">
            <input type="hidden" id="contentId">
            <div class="form-field">
              <label for="contentTitle">标题</label>
              <input class="input" id="contentTitle" required>
            </div>
            <div class="form-field">
              <label for="contentCategory">分类</label>
              <select class="select" id="contentCategory" required></select>
            </div>
            <div class="form-field">
              <label for="contentSummary">简介</label>
              <input class="input" id="contentSummary" required>
            </div>
            <div class="form-field">
              <label for="contentOrder">排序</label>
              <input class="input" id="contentOrder" type="number" value="100">
            </div>
            <div class="form-field full">
              <label for="contentImage">封面图片地址</label>
              <input class="input" id="contentImage" placeholder="https://...">
            </div>
            <div class="form-field full">
              <label for="contentVideo">视频地址</label>
              <input class="input" id="contentVideo" placeholder="https://...">
            </div>
            <div class="form-field">
              <label for="contentImageFile">上传图片</label>
              <input class="input" id="contentImageFile" type="file" accept="image/*">
            </div>
            <div class="form-field">
              <label for="contentVideoFile">上传视频</label>
              <input class="input" id="contentVideoFile" type="file" accept="video/*">
            </div>
            <div class="form-field full">
              <label for="contentBody">正文内容</label>
              <textarea class="textarea" id="contentBody" required></textarea>
            </div>
            <div class="form-field">
              <label for="contentSource">后台来源记录</label>
              <input class="input" id="contentSource">
            </div>
            <div class="form-field">
              <label for="contentStatus">状态</label>
              <select class="select" id="contentStatus">
                <option value="published">已发布</option>
                <option value="draft">草稿</option>
                <option value="hidden">隐藏</option>
              </select>
            </div>
            <button class="text-button primary" type="submit"><i data-lucide="save"></i>保存内容</button>
          </form>
        </div>
      </div>
    </div>

    <div class="modal" id="adminModal" aria-hidden="true">
      <div class="modal-box" style="width:min(580px,100%)">
        <div class="modal-head">
          <h3 id="adminModalTitle">新增账号</h3>
          <button class="icon-button" data-close="adminModal" aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-content">
          <form class="form-grid" id="adminForm">
            <input type="hidden" id="adminId">
            <div class="form-field full">
              <label for="adminName">账号</label>
              <input class="input" id="adminName" required>
            </div>
            <div class="form-field full">
              <label for="adminPassword">密码</label>
              <input class="input" id="adminPassword" type="password" placeholder="不修改密码可留空">
            </div>
            <div class="form-field full">
              <label for="adminEmail">找回邮箱</label>
              <input class="input" id="adminEmail" type="email" required>
            </div>
            <div class="form-field">
              <label for="adminRole">角色</label>
              <select class="select" id="adminRole">
                <option value="超级管理员">超级管理员</option>
                <option value="内容管理员">内容管理员</option>
                <option value="上传管理员">上传管理员</option>
                <option value="只读管理员">只读管理员</option>
              </select>
            </div>
            <div class="form-field">
              <label for="adminState">状态</label>
              <select class="select" id="adminState">
                <option value="启用">启用</option>
                <option value="停用">停用</option>
              </select>
            </div>
            <button class="text-button primary" type="submit"><i data-lucide="save"></i>保存账号</button>
          </form>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const categories = ["WZ业务目录", "定制地图展示", "BOSS配套地图展示", "系列地图"];
      const contentKey = "maplestorynk.contents.v3";
      const adminKey = "maplestorynk.admins.v3";
      const sessionKey = "maplestorynk.session.v3";
      const fallbackImage = "https://images.unsplash.com/photo-1535378620166-273708d44e4c?auto=format&fit=crop&w=1200&q=80";

      const starterContents = [
        {
          id: "wz-001",
          title: "WZ 业务目录",
          category: "WZ业务目录",
          summary: "WZ 修改、素材替换、资源整理与交付目录。",
          bodyHtml: "<p>这里用于展示 WZ 业务内容。可以放业务范围、处理流程、交付格式、注意事项和案例说明。</p><p>后续从 Word 或网页导入后，正文会直接出现在这个详情页，而不是跳转到外部网站。</p>",
          source: "腾讯文档 WZ业务目录",
          image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1200&q=82",
          video: "",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        },
        {
          id: "map-001",
          title: "定制地图展示",
          category: "定制地图展示",
          summary: "地图层级、入口区域、怪物分布与视觉风格。",
          bodyHtml: "<p>这里用于展示定制地图内容。可以放地图全景图、局部截图、演示视频、地图编号和对应 WZ 文件说明。</p>",
          source: "腾讯文档 定制地图展示",
          image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=82",
          video: "",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        },
        {
          id: "boss-001",
          title: "BOSS 配套地图展示",
          category: "BOSS配套地图展示",
          summary: "BOSS 区域、出生点、传送门、奖励点和背景资源。",
          bodyHtml: "<p>这里用于展示 BOSS 配套地图内容。可以补充 BOSS 参数、入口条件、战斗流程、地图资源和掉落展示。</p>",
          source: "腾讯文档 BOSS配套地图展示",
          image: "https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1200&q=82",
          video: "",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        },
        {
          id: "series-001",
          title: "系列地图",
          category: "系列地图",
          summary: "按主题组织多个连续地图，形成完整地图包。",
          bodyHtml: "<p>这里用于展示系列地图内容。可以按章节、等级、入口、任务线和地图包结构整理。</p>",
          source: "腾讯文档 系列地图",
          image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=82",
          video: "",
          order: 100,
          status: "published",
          updatedAt: "2026-07-18"
        }
      ];

      const starterAdmins = [
        { id: "admin-1", name: "admin", password: "admin123", email: "admin@maplestorynk.online", role: "超级管理员", state: "启用", createdAt: "2026-07-18" }
      ];

      let contents = load(contentKey, starterContents);
      let admins = load(adminKey, starterAdmins);
      let currentAdmin = JSON.parse(localStorage.getItem(sessionKey) || "null");
      let pendingImport = null;

      const $ = (selector) => document.querySelector(selector);
      const $$ = (selector) => Array.from(document.querySelectorAll(selector));

      function load(key, fallback) {
        try {
          const data = JSON.parse(localStorage.getItem(key));
          return Array.isArray(data) ? data : fallback;
        } catch {
          return fallback;
        }
      }

      function save() {
        localStorage.setItem(contentKey, JSON.stringify(contents));
        localStorage.setItem(adminKey, JSON.stringify(admins));
        localStorage.setItem(sessionKey, JSON.stringify(currentAdmin));
      }

      function icon() {
        if (window.lucide) window.lucide.createIcons();
      }

      function toast(message) {
        const node = $("#toast");
        node.textContent = message;
        node.classList.add("active");
        setTimeout(() => node.classList.remove("active"), 2300);
      }

      function showModal(id) {
        $("#" + id).classList.add("active");
        $("#" + id).setAttribute("aria-hidden", "false");
        icon();
      }

      function closeModal(id) {
        $("#" + id).classList.remove("active");
        $("#" + id).setAttribute("aria-hidden", "true");
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function textToHtml(text) {
        return String(text || "")
          .split(/\n{2,}/)
          .map((block) => `<p>${escapeHtml(block.trim()).replace(/\n/g, "<br>")}</p>`)
          .join("");
      }

      function htmlToText(html) {
        const doc = new DOMParser().parseFromString(html || "", "text/html");
        return doc.body.textContent || "";
      }

      function categoryIcon(category) {
        return {
          "WZ业务目录": "archive",
          "定制地图展示": "map",
          "BOSS配套地图展示": "swords",
          "系列地图": "layers-3"
        }[category] || "file-text";
      }

      function visibleItems(category) {
        const keyword = $("#searchInput")?.value.trim().toLowerCase() || "";
        return contents
          .filter((item) => item.status === "published" && item.category === category)
          .filter((item) => {
            if (!keyword) return true;
            return [item.title, item.summary, htmlToText(item.bodyHtml)].join(" ").toLowerCase().includes(keyword);
          })
          .sort((a, b) => Number(a.order || 100) - Number(b.order || 100) || String(b.updatedAt).localeCompare(String(a.updatedAt)));
      }

      function renderDirectory() {
        $("#directoryLanes").innerHTML = categories.map((category) => {
          const items = visibleItems(category);
          const cards = items.map((item) => `
            <article class="content-card">
              <img src="${item.image || fallbackImage}" alt="${escapeHtml(item.title)}">
              <div class="card-body">
                <div>
                  <h3>${escapeHtml(item.title)}</h3>
                  <p>${escapeHtml(item.summary)}</p>
                </div>
                <button class="text-button" data-detail="${item.id}"><i data-lucide="eye"></i>查看详情</button>
              </div>
            </article>
          `).join("") || `<div class="empty-card">暂无内容</div>`;

          return `
            <section class="lane">
              <div class="lane-head">
                <div class="lane-title">
                  <i data-lucide="${categoryIcon(category)}"></i>
                  <h2>${category}</h2>
                  <span class="lane-count">${items.length} 条</span>
                </div>
              </div>
              <div class="lane-scroll">${cards}</div>
            </section>
          `;
        }).join("");
      }

      function renderMetrics() {
        const published = contents.filter((item) => item.status === "published").length;
        const drafts = contents.filter((item) => item.status === "draft").length;
        const imported = contents.filter((item) => item.source).length;
        $("#metrics").innerHTML = [
          ["已发布", published],
          ["草稿", drafts],
          ["导入内容", imported],
          ["管理员", admins.length]
        ].map(([label, value]) => `<div class="metric-card"><span>${label}</span><strong>${value}</strong></div>`).join("");
      }

      function renderAdminTables() {
        $("#currentAdminLine").textContent = currentAdmin ? `当前账号：${currentAdmin.name} / ${currentAdmin.role}` : "当前账号：未登录";

        $("#recentRows").innerHTML = [...contents]
          .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))
          .slice(0, 8)
          .map((item) => `
            <tr>
              <td>${escapeHtml(item.title)}</td>
              <td>${item.category}</td>
              <td>${escapeHtml(item.source || "手动录入")}</td>
              <td><span class="status ${item.status !== "published" ? "offline" : ""}">${statusText(item.status)}</span></td>
              <td>${item.order || 100}</td>
              <td>${item.updatedAt}</td>
            </tr>
          `).join("");

        $("#contentRows").innerHTML = contents.map((item) => `
          <tr>
            <td>${escapeHtml(item.title)}</td>
            <td>${item.category}</td>
            <td>${escapeHtml(item.source || "手动录入")}</td>
            <td><span class="status ${item.status !== "published" ? "offline" : ""}">${statusText(item.status)}</span></td>
            <td>${item.order || 100}</td>
            <td>
              <div class="actions">
                <button class="icon-button" data-edit-content="${item.id}" aria-label="编辑"><i data-lucide="pencil"></i></button>
                <button class="icon-button danger" data-delete-content="${item.id}" aria-label="删除"><i data-lucide="trash-2"></i></button>
              </div>
            </td>
          </tr>
        `).join("");

        $("#adminRows").innerHTML = admins.map((admin) => `
          <tr>
            <td>${escapeHtml(admin.name)}</td>
            <td>${admin.role}</td>
            <td>${escapeHtml(admin.email)}</td>
            <td><span class="status ${admin.state === "停用" ? "offline" : ""}">${admin.state}</span></td>
            <td>${admin.createdAt}</td>
            <td>
              <div class="actions">
                <button class="icon-button" data-edit-admin="${admin.id}" aria-label="编辑账号"><i data-lucide="settings"></i></button>
                <button class="icon-button" data-reset-admin="${admin.id}" aria-label="修改密码"><i data-lucide="key-round"></i></button>
                ${admin.name === "admin" ? "" : `<button class="icon-button danger" data-delete-admin="${admin.id}" aria-label="删除账号"><i data-lucide="trash-2"></i></button>`}
              </div>
            </td>
          </tr>
        `).join("");
      }

      function statusText(status) {
        return { published: "已发布", draft: "草稿", hidden: "隐藏" }[status] || status;
      }

      function renderSelects() {
        const options = categories.map((category) => `<option value="${category}">${category}</option>`).join("");
        ["contentCategory", "docCategory", "urlCategory", "previewCategory"].forEach((id) => $("#" + id).innerHTML = options);
      }

      function render() {
        renderSelects();
        renderDirectory();
        renderMetrics();
        renderAdminTables();
        icon();
      }

      function openDetail(id) {
        const item = contents.find((entry) => entry.id === id);
        if (!item) return;
        $("#detailTitle").textContent = item.title;
        $("#detailContent").innerHTML = `
          <div class="reader">
            <div>
              ${item.video ? `<div class="reader-media"><video controls src="${item.video}"></video></div>` : `<div class="reader-media"><img src="${item.image || fallbackImage}" alt="${escapeHtml(item.title)}"></div>`}
              <div class="reader-body">${item.bodyHtml || textToHtml(item.summary)}</div>
            </div>
            <aside class="reader-side">
              <div class="side-line">分类<strong>${item.category}</strong></div>
              <div class="side-line">简介<strong>${escapeHtml(item.summary)}</strong></div>
            </aside>
          </div>
        `;
        showModal("detailModal");
      }

      function openContentEditor(id) {
        const item = id ? contents.find((entry) => entry.id === id) : null;
        $("#contentModalTitle").textContent = item ? "编辑内容" : "新增内容";
        $("#contentId").value = item?.id || "";
        $("#contentTitle").value = item?.title || "";
        $("#contentCategory").value = item?.category || categories[0];
        $("#contentSummary").value = item?.summary || "";
        $("#contentOrder").value = item?.order || 100;
        $("#contentImage").value = item?.image || "";
        $("#contentVideo").value = item?.video || "";
        $("#contentBody").value = htmlToText(item?.bodyHtml || "");
        $("#contentSource").value = item?.source || "";
        $("#contentStatus").value = item?.status || "published";
        $("#contentImageFile").value = "";
        $("#contentVideoFile").value = "";
        showModal("contentModal");
      }

      function openAdminEditor(id) {
        const admin = id ? admins.find((entry) => entry.id === id) : null;
        $("#adminModalTitle").textContent = admin ? "编辑账号权限" : "新增账号";
        $("#adminId").value = admin?.id || "";
        $("#adminName").value = admin?.name || "";
        $("#adminName").disabled = Boolean(admin);
        $("#adminPassword").value = "";
        $("#adminEmail").value = admin?.email || "";
        $("#adminRole").value = admin?.role || "内容管理员";
        $("#adminState").value = admin?.state || "启用";
        showModal("adminModal");
      }

      function isSuperAdmin() {
        return currentAdmin?.role === "超级管理员";
      }

      function requireSuperAdmin() {
        if (isSuperAdmin()) return true;
        toast("需要超级管理员权限");
        return false;
      }

      function setImportStatus(text, percent) {
        $("#importStatus").textContent = text;
        $("#importProgress").style.width = `${percent}%`;
      }

      function updatePreview(data) {
        pendingImport = data;
        $("#previewTitle").value = data.title || "";
        $("#previewCategory").value = data.category || categories[0];
        $("#previewOrder").value = data.order || 100;
        $("#previewSource").value = data.source || "";
        $("#manualBody").value = htmlToText(data.bodyHtml || "");
        $("#previewBody").innerHTML = data.bodyHtml || "";
      }

      function clearImport() {
        pendingImport = null;
        $("#previewTitle").value = "";
        $("#previewOrder").value = "100";
        $("#previewSource").value = "";
        $("#manualBody").value = "";
        $("#previewBody").innerHTML = "";
        setImportStatus("等待导入", 0);
      }

      function parseInputLink(value) {
        const url = value.match(/https?:\/\/\S+/)?.[0] || "";
        const title = value.replace(url, "").replace(/[【】]/g, " ").trim();
        return { url, title: title || url };
      }

      async function readDocument(file) {
        const lower = file.name.toLowerCase();
        if (lower.endsWith(".docx") && window.mammoth) {
          const result = await window.mammoth.convertToHtml({ arrayBuffer: await file.arrayBuffer() });
          return result.value;
        }
        return textToHtml(await file.text());
      }

      async function readUrlContent(url) {
        const targets = [url, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
        for (const target of targets) {
          try {
            const response = await fetch(target);
            if (!response.ok) continue;
            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, "text/html");
            doc.querySelectorAll("script, style, iframe, nav, footer").forEach((node) => node.remove());
            const title = doc.querySelector("title")?.textContent?.trim() || "";
            const nodes = Array.from(doc.querySelectorAll("h1, h2, h3, p, li")).slice(0, 80);
            const bodyHtml = nodes.map((node) => {
              const text = node.textContent.trim();
              if (!text) return "";
              const tag = ["H1", "H2", "H3"].includes(node.tagName) ? node.tagName.toLowerCase() : "p";
              return `<${tag}>${escapeHtml(text)}</${tag}>`;
            }).join("");
            if (bodyHtml) return { title, bodyHtml };
          } catch {
            continue;
          }
        }
        return { title: "", bodyHtml: "" };
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("button, a");
        if (!target) return;

        if (target.dataset.close) closeModal(target.dataset.close);
        if (target.id === "authButton") showModal("authModal");
        if (target.id === "brandHome") document.body.classList.remove("view-admin");
        if (target.dataset.detail) openDetail(target.dataset.detail);

        if (target.dataset.authTab) {
          $$(".seg-button[data-auth-tab]").forEach((button) => button.classList.toggle("active", button.dataset.authTab === target.dataset.authTab));
          $$("[data-auth-panel]").forEach((panel) => panel.classList.toggle("hidden", panel.dataset.authPanel !== target.dataset.authTab));
        }

        if (target.id === "quickAddButton" || target.id === "addContentButton") openContentEditor();
        if (target.dataset.editContent) openContentEditor(target.dataset.editContent);

        if (target.dataset.deleteContent) {
          const item = contents.find((entry) => entry.id === target.dataset.deleteContent);
          if (item && confirm(`删除「${item.title}」？`)) {
            contents = contents.filter((entry) => entry.id !== item.id);
            save();
            render();
            toast("内容已删除");
          }
        }

        if (target.id === "addAdminButton") {
          if (requireSuperAdmin()) openAdminEditor();
        }

        if (target.dataset.editAdmin) {
          if (requireSuperAdmin()) openAdminEditor(target.dataset.editAdmin);
        }

        if (target.dataset.resetAdmin) {
          if (!requireSuperAdmin()) return;
          const admin = admins.find((entry) => entry.id === target.dataset.resetAdmin);
          const nextPassword = prompt(`给「${admin.name}」设置新密码`);
          if (nextPassword) {
            admin.password = nextPassword;
            save();
            toast("密码已修改");
          }
        }

        if (target.dataset.deleteAdmin) {
          if (!requireSuperAdmin()) return;
          const admin = admins.find((entry) => entry.id === target.dataset.deleteAdmin);
          if (admin && confirm(`删除账号「${admin.name}」？`)) {
            admins = admins.filter((entry) => entry.id !== admin.id);
            save();
            render();
            toast("账号已删除");
          }
        }

        if (target.id === "backToSite") {
          document.body.classList.remove("view-admin");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        if (target.dataset.panel) {
          $$(".admin-menu .nav-button").forEach((button) => button.classList.toggle("active", button.dataset.panel === target.dataset.panel));
          $$(".admin-panel").forEach((panel) => panel.classList.toggle("active", panel.dataset.adminPanel === target.dataset.panel));
        }

        if (target.id === "confirmImportButton") {
          const manualText = $("#manualBody").value.trim();
          const importedText = htmlToText(pendingImport?.bodyHtml || "").trim();
          const bodyHtml = manualText === importedText ? pendingImport?.bodyHtml : textToHtml(manualText);
          if (!$("#previewTitle").value.trim() || !bodyHtml) {
            toast("标题和正文不能为空");
            return;
          }
          contents = [{
            id: `import-${Date.now()}`,
            title: $("#previewTitle").value.trim(),
            category: $("#previewCategory").value,
            summary: htmlToText(bodyHtml).slice(0, 70) || "导入内容",
            bodyHtml,
            source: $("#previewSource").value.trim(),
            image: fallbackImage,
            video: "",
            order: Number($("#previewOrder").value || 100),
            status: "published",
            updatedAt: today()
          }, ...contents];
          save();
          render();
          clearImport();
          toast("已添加到目录");
        }

        if (target.id === "clearImportButton") clearImport();
      });

      $("#loginForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const user = $("#loginUser").value.trim();
        const pass = $("#loginPass").value.trim();
        const admin = admins.find((entry) => entry.name === user && entry.password === pass && entry.state === "启用");
        if (!admin) {
          toast("账号、密码或状态不正确");
          return;
        }
        currentAdmin = { id: admin.id, name: admin.name, role: admin.role };
        save();
        closeModal("authModal");
        document.body.classList.add("view-admin");
        render();
        toast("已进入后台");
      });

      $("#registerForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const name = $("#registerUser").value.trim();
        if (admins.some((entry) => entry.name === name)) {
          toast("账号已存在");
          return;
        }
        admins = [...admins, {
          id: `admin-${Date.now()}`,
          name,
          password: $("#registerPass").value.trim(),
          email: $("#registerEmail").value.trim(),
          role: "内容管理员",
          state: "启用",
          createdAt: today()
        }];
        save();
        $("#registerForm").reset();
        toast("注册成功，可直接登录");
        $("[data-auth-tab='login']").click();
      });

      $("#contentForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const id = $("#contentId").value || `content-${Date.now()}`;
        const existing = contents.find((item) => item.id === id);
        const next = {
          id,
          title: $("#contentTitle").value.trim(),
          category: $("#contentCategory").value,
          summary: $("#contentSummary").value.trim(),
          bodyHtml: textToHtml($("#contentBody").value.trim()),
          source: $("#contentSource").value.trim(),
          image: $("#contentImage").value.trim() || fallbackImage,
          video: $("#contentVideo").value.trim(),
          order: Number($("#contentOrder").value || 100),
          status: $("#contentStatus").value,
          updatedAt: today()
        };
        contents = existing ? contents.map((item) => item.id === id ? next : item) : [next, ...contents];
        save();
        closeModal("contentModal");
        render();
        toast("内容已保存");
      });

      $("#adminForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!requireSuperAdmin()) return;
        const id = $("#adminId").value;
        const existing = admins.find((entry) => entry.id === id);
        const password = $("#adminPassword").value.trim();
        const next = {
          id: id || `admin-${Date.now()}`,
          name: existing?.name || $("#adminName").value.trim(),
          password: password || existing?.password || "123456",
          email: $("#adminEmail").value.trim(),
          role: $("#adminRole").value,
          state: $("#adminState").value,
          createdAt: existing?.createdAt || today()
        };
        admins = existing ? admins.map((entry) => entry.id === id ? next : entry) : [...admins, next];
        if (currentAdmin?.id === next.id) currentAdmin = { id: next.id, name: next.name, role: next.role };
        save();
        $("#adminName").disabled = false;
        $("#adminForm").reset();
        closeModal("adminModal");
        render();
        toast("账号已保存");
      });

      $("#docImportForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const file = $("#docFile").files?.[0];
        if (!file) {
          toast("请选择文档");
          return;
        }
        try {
          setImportStatus("正在读取文档", 25);
          const bodyHtml = await readDocument(file);
          setImportStatus("正在生成预览", 72);
          updatePreview({
            title: file.name.replace(/\.[^.]+$/, ""),
            category: $("#docCategory").value,
            order: Number($("#docOrder").value || 100),
            source: file.name,
            bodyHtml
          });
          setImportStatus("读取成功，请确认", 100);
        } catch {
          setImportStatus("读取失败，请手动粘贴正文", 100);
        }
      });

      $("#urlImportForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const parsed = parseInputLink($("#sourceInput").value.trim());
        if (!parsed.url) {
          toast("没有识别到网页地址");
          return;
        }
        setImportStatus("正在连接网页", 20);
        const result = await readUrlContent(parsed.url);
        setImportStatus(result.bodyHtml ? "正在生成预览" : "读取受限，可手动粘贴正文", 76);
        updatePreview({
          title: result.title || parsed.title,
          category: $("#urlCategory").value,
          order: Number($("#urlOrder").value || 100),
          source: parsed.url,
          bodyHtml: result.bodyHtml || textToHtml("")
        });
        setImportStatus(result.bodyHtml ? "读取成功，请确认" : "等待手动补充正文", 100);
      });

      $("#searchInput").addEventListener("input", render);
      $("#resetButton").addEventListener("click", () => {
        $("#searchInput").value = "";
        render();
      });

      $("#contentImageFile").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) $("#contentImage").value = URL.createObjectURL(file);
      });

      $("#contentVideoFile").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) $("#contentVideo").value = URL.createObjectURL(file);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          $$(".modal.active").forEach((modal) => closeModal(modal.id));
          $("#adminName").disabled = false;
        }
      });

      render();
    </script>
  </body>
</html>
